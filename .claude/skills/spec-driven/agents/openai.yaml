interface:
  display_name: "Spec Driven"
  short_description: "TripProof light spec loop guidance"
  default_prompt: "현재 요청이 spec 문서, AC, 또는 명시된 product contract를 기준으로 삼는 작업일 때만 $spec-driven을 사용한다. 그 조건이 아니면 spec 문서나 brief를 강제하지 않고 현재 요청 범위에서 답한다. spec 기준 작업이라면 범위를 줄이기 전에 제품 흐름을 유지한다: 사용자 자료 -> 근거/후보 -> 답변/상태 -> UI. 작은 작업이면 새 spec 없이 진행한다. 큰 작업이면 선택한 slice 1개와 관찰 가능한 AC 1-3개로 짧은 brief를 만든다. 흐름을 어디서 자를지 애매하면 raw output, fixture, debug response, UI-only demo를 제품 확인처럼 만들지 말고 사용자에게 묻는다."
