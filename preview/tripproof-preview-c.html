<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TripProof · C안 (A+B 통합)</title>
  <style>
    :root {
      --bg: #eef1f4;
      --surface: #ffffff;
      --surface-soft: #f6f8fa;
      --surface-strong: #e9eef2;
      --ink: #151d23;
      --muted: #5f6e79;
      --faint: #8b98a2;
      --line: #dde4ea;
      --line-strong: #c2ccd4;
      --blue: #2f6bf0;
      --blue-soft: #e9f0ff;
      --green: #1f7a3d;
      --green-soft: #e6f6ec;
      --amber: #966200;
      --amber-soft: #fff1d6;
      --red: #b6302f;
      --red-soft: #ffe9e9;
      --purple: #6c3fb4;
      --purple-soft: #f1eaff;
      --shadow-soft: 0 2px 8px rgb(20 30 38 / 5%);
      --radius: 12px;
      --sans: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "Apple SD Gothic Neo", sans-serif;
      --mono: "SFMono-Regular", Consolas, Menlo, monospace;
    }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; background: var(--bg); color: var(--ink); font-family: var(--sans); font-size: 14px; line-height: 1.5; }
    button, textarea, input, select { font: inherit; color: inherit; }
    button { cursor: pointer; }
    button:disabled { cursor: default; opacity: 0.5; }
    h1, h2, h3, h4, p, dl { margin: 0; }
    code { font-family: var(--mono); font-size: 12px; }

    .topbar { position: sticky; top: 0; z-index: 30; display: flex; align-items: center; gap: 16px; min-height: 60px; padding: 0 20px; background: rgb(255 255 255 / 92%); backdrop-filter: blur(14px); border-bottom: 1px solid var(--line); }
    .brand { display: flex; align-items: center; gap: 11px; }
    .mark { display: grid; place-items: center; width: 34px; height: 34px; border-radius: 9px; background: var(--ink); color: #fff; font-family: var(--mono); font-weight: 800; font-size: 13px; }
    .brand strong { display: block; font-size: 15px; line-height: 1.1; }
    .brand small { color: var(--muted); font-size: 12px; }
    .variant-tag { margin-left: 2px; padding: 3px 9px; border-radius: 999px; background: var(--purple-soft); color: var(--purple); font-size: 11px; font-weight: 700; }
    .topbar select { height: 34px; border: 1px solid var(--line); border-radius: 8px; background: var(--surface); padding: 0 10px; }
    .spacer { flex: 1; }
    .counters { display: flex; gap: 7px; }

    .pill { display: inline-flex; align-items: center; gap: 5px; min-height: 24px; padding: 0 9px; border: 1px solid var(--line); border-radius: 999px; background: var(--surface); color: var(--muted); font-size: 11.5px; white-space: nowrap; }
    .pill.info { border-color: #c4d6ff; background: var(--blue-soft); color: var(--blue); }
    .pill.good { border-color: #b6e0c2; background: var(--green-soft); color: var(--green); }
    .pill.warn { border-color: #efcd8c; background: var(--amber-soft); color: var(--amber); }
    .pill.danger { border-color: #f0b3b3; background: var(--red-soft); color: var(--red); }
    .pill.saved { border-color: #d6c4ff; background: var(--purple-soft); color: var(--purple); }
    .pill.user { border-color: #c9d2da; background: var(--surface-strong); color: var(--muted); }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; }

    .layout { display: grid; grid-template-columns: 264px minmax(0, 1fr) 296px; gap: 16px; max-width: 1500px; margin: 0 auto; padding: 18px 20px 40px; }
    .rail { display: grid; gap: 14px; align-content: start; position: sticky; top: 78px; }
    .main { display: grid; gap: 14px; align-content: start; }

    .card-box { border: 1px solid var(--line); border-radius: var(--radius); background: var(--surface); box-shadow: var(--shadow-soft); }
    .box-head { display: flex; align-items: center; justify-content: space-between; gap: 8px; padding: 13px 14px; border-bottom: 1px solid var(--line); }
    .box-head h2 { font-size: 14px; }
    .box-head .sub { color: var(--muted); font-size: 12px; }
    .box-body { padding: 13px 14px; }

    .trip-name { font-size: 17px; font-weight: 800; }
    .trip-sub { color: var(--muted); font-size: 12px; margin-top: 1px; }
    .mini-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin: 12px 0; }
    .mini-stats div { padding: 8px; border: 1px solid var(--line); border-radius: 8px; background: var(--surface-soft); text-align: center; }
    .mini-stats strong { display: block; font-size: 16px; }
    .mini-stats span { color: var(--muted); font-size: 11px; }

    .btn { min-height: 34px; padding: 0 12px; border: 1px solid var(--line); border-radius: 8px; background: var(--surface); font-size: 13px; }
    .btn:hover:not(:disabled) { border-color: var(--line-strong); }
    .btn.primary { border-color: var(--blue); background: var(--blue); color: #fff; font-weight: 700; }
    .btn.primary:hover:not(:disabled) { background: #285dd6; }
    .btn.block { width: 100%; }
    .btn.sm { min-height: 30px; padding: 0 10px; font-size: 12.5px; }
    .btn.ghost { background: var(--surface-soft); }
    .add-row { display: flex; gap: 7px; }

    .lib-list { display: grid; gap: 8px; }
    .lib-item { display: grid; grid-template-columns: 30px 1fr; gap: 9px; align-items: center; width: 100%; text-align: left; padding: 7px 8px; border: 1px solid var(--line); border-radius: 9px; background: var(--surface); }
    .lib-item:hover { border-color: var(--line-strong); background: var(--surface-soft); }
    .file-badge { display: grid; place-items: center; width: 30px; height: 36px; border-radius: 6px; background: var(--surface-strong); color: var(--muted); font-family: var(--mono); font-size: 9px; font-weight: 800; }
    .lib-item strong { display: block; font-size: 12.5px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .lib-item > span > span { color: var(--faint); font-size: 11px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; display: block; }

    /* right: candidates */
    .cand-list { display: grid; gap: 8px; }
    .cand-card { display: grid; gap: 7px; padding: 10px; border: 1px solid var(--line); border-radius: 10px; background: var(--surface); }
    .cand-card .cc-title { font-size: 12.5px; font-weight: 700; }
    .cand-card .cc-title .cat { color: var(--faint); font-weight: 600; }
    .cand-card .cc-value { font-size: 12px; color: var(--muted); }
    .cand-card .cc-actions { display: flex; gap: 6px; flex-wrap: wrap; }

    /* center tabs */
    .tabs { display: inline-flex; gap: 4px; padding: 4px; border-radius: 11px; background: var(--surface-strong); width: fit-content; }
    .tab { min-height: 34px; padding: 0 15px; border: 0; border-radius: 8px; background: transparent; color: var(--muted); font-weight: 600; font-size: 13px; }
    .tab.active { background: var(--surface); color: var(--ink); box-shadow: var(--shadow-soft); }
    .tab .badge { margin-left: 6px; padding: 1px 6px; border-radius: 999px; background: var(--surface-strong); font-size: 11px; color: var(--muted); }
    .tab.active .badge { background: var(--blue-soft); color: var(--blue); }
    .view { display: none; }
    .view.active { display: grid; gap: 14px; }

    /* chat */
    .chat-box { display: grid; grid-template-rows: auto 1fr auto; min-height: 420px; }
    .scope-row { padding: 11px 14px; border-bottom: 1px solid var(--line); display: flex; align-items: center; gap: 8px; color: var(--muted); font-size: 12px; }
    .thread { display: grid; gap: 14px; padding: 16px; align-content: start; overflow: auto; max-height: 44vh; }
    .msg { max-width: 90%; }
    .msg.user { justify-self: end; }
    .bubble-user { padding: 10px 13px; border-radius: 13px 13px 3px 13px; background: var(--ink); color: #fff; }
    .msg-ai { display: grid; gap: 7px; }
    .who { display: flex; align-items: center; gap: 7px; color: var(--muted); font-size: 12px; }
    .who .ai-dot { width: 18px; height: 18px; border-radius: 6px; background: var(--ink); color: #fff; display: grid; place-items: center; font-size: 9px; font-family: var(--mono); font-weight: 800; }

    .answer { border: 1px solid #c8dbff; border-radius: var(--radius); background: #fbfdff; padding: 14px; display: grid; gap: 11px; }
    .answer-top { display: flex; flex-wrap: wrap; gap: 7px; align-items: center; }
    .answer-body { font-size: 14.5px; line-height: 1.55; }
    .ev-toggle { display: inline-flex; align-items: center; gap: 6px; width: fit-content; min-height: 30px; padding: 0 11px; border: 1px solid var(--line); border-radius: 8px; background: var(--surface); font-size: 12.5px; color: var(--muted); }
    .ev-toggle:hover { border-color: var(--line-strong); }
    .ev-toggle .caret { transition: transform .15s; }
    .ev-toggle.open .caret { transform: rotate(90deg); }
    .ev-list { display: grid; gap: 8px; }
    .ev-item { display: grid; gap: 5px; padding: 11px; border: 1px solid var(--line); border-radius: 9px; background: var(--surface); }
    .ev-item .ev-head { display: flex; align-items: center; gap: 8px; }
    .ev-item .ev-head strong { font-size: 12.5px; }
    .ev-item .ev-loc { color: var(--faint); font-size: 11.5px; }
    .ev-snippet { padding: 9px 11px; border-left: 3px solid var(--amber); background: var(--amber-soft); border-radius: 0 7px 7px 0; font-size: 12.5px; color: #5b4300; }
    .ev-none { padding: 9px 11px; border-left: 3px solid var(--line-strong); background: var(--surface-soft); border-radius: 0 7px 7px 0; font-size: 12.5px; color: var(--muted); }
    .answer-actions { display: flex; flex-wrap: wrap; gap: 8px; }

    .composer { display: grid; grid-template-columns: 1fr auto; gap: 10px; align-items: end; padding: 13px 14px; border-top: 1px solid var(--line); background: var(--surface); border-radius: 0 0 var(--radius) var(--radius); }
    .composer textarea { width: 100%; min-height: 44px; max-height: 120px; resize: none; border: 1px solid var(--line); border-radius: 10px; padding: 11px 12px; background: var(--surface-soft); }
    .composer textarea:focus { outline: none; border-color: var(--blue); background: var(--surface); }

    .typing { display: inline-flex; gap: 4px; align-items: center; padding: 4px 0; }
    .typing i { width: 6px; height: 6px; border-radius: 50%; background: var(--faint); animation: blink 1.2s infinite; }
    .typing i:nth-child(2) { animation-delay: .2s; }
    .typing i:nth-child(3) { animation-delay: .4s; }
    @keyframes blink { 0%, 60%, 100% { opacity: .25; } 30% { opacity: 1; } }

    /* draft (below chat) */
    .draft-box { border-color: #c8dbff; }
    .draft-caution { display: flex; gap: 8px; align-items: flex-start; padding: 10px 11px; border-radius: 9px; background: var(--amber-soft); border: 1px solid #efcd8c; color: #5b4300; font-size: 12.5px; }
    .draft-caution.danger { background: var(--red-soft); border-color: #f0b3b3; color: #7a1f1f; }
    .draft-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .field { display: grid; gap: 3px; padding: 8px 10px; border: 1px solid var(--line); border-radius: 8px; background: var(--surface); }
    .field span { color: var(--muted); font-size: 11px; }
    .field strong { font-size: 13.5px; }
    .field input, .field select { border: 0; border-bottom: 1px dashed var(--line-strong); background: transparent; padding: 2px 0; font-size: 13.5px; font-weight: 700; width: 100%; }
    .field input:focus, .field select:focus { outline: none; border-bottom-color: var(--blue); }
    .field.edit { border-color: var(--blue); background: #fbfdff; }
    .empty { display: grid; gap: 7px; place-items: center; text-align: center; padding: 30px 20px; border: 1px dashed var(--line-strong); border-radius: var(--radius); background: var(--surface-soft); color: var(--muted); }

    /* board: timeline → category */
    .phase-rail { display: grid; grid-template-columns: 18px 1fr; gap: 12px; }
    .phase-line { display: grid; justify-items: center; }
    .phase-line .knob { width: 13px; height: 13px; border-radius: 50%; border: 3px solid var(--blue); background: #fff; margin-top: 4px; }
    .phase-line .stem { width: 2px; flex: 1; background: var(--line); }
    .phase-block { display: grid; gap: 10px; }
    .phase-head { display: flex; align-items: baseline; gap: 10px; }
    .phase-head h3 { font-size: 15px; }
    .phase-head .when { color: var(--muted); font-size: 12px; }
    .cat-group { display: grid; gap: 8px; margin-bottom: 14px; }
    .cat-label { display: flex; align-items: center; gap: 7px; color: var(--muted); font-size: 12px; font-weight: 700; }
    .cat-cards { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 9px; }
    .board-card { display: grid; gap: 8px; padding: 12px; border: 1px solid var(--line); border-radius: 10px; background: var(--surface); box-shadow: var(--shadow-soft); }
    .board-card .bc-top { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
    .bc-pills { display: flex; gap: 6px; flex-wrap: wrap; justify-content: flex-end; }
    .board-card h4 { font-size: 13px; color: var(--muted); font-weight: 600; }
    .board-card .bc-value { font-size: 16px; font-weight: 800; line-height: 1.25; }
    .board-card .bc-actions { display: flex; gap: 7px; flex-wrap: wrap; }
    .board-card.saved-card { border-color: #d6c4ff; background: #fcfaff; }

    /* field */
    .field-head { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; border-radius: var(--radius); background: linear-gradient(135deg, #1b2a3a, #0f1722); color: #fff; }
    .field-head h3 { font-size: 16px; }
    .field-head p { color: rgb(255 255 255 / 70%); font-size: 12px; }
    .field-phase { display: grid; gap: 9px; }
    .field-phase h4 { font-size: 13px; color: var(--muted); }
    .field-grid { display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 9px; }
    .field-card { display: grid; gap: 6px; padding: 15px; border-radius: 12px; border: 1px solid var(--line); background: var(--surface); box-shadow: var(--shadow-soft); }
    .field-card .fc-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
    .field-card .fc-cat { color: var(--faint); font-size: 12px; }
    .field-card .fc-title { font-size: 13px; color: var(--muted); }
    .field-card .fc-value { font-size: 20px; font-weight: 800; }

    .toast { position: fixed; left: 50%; bottom: 26px; transform: translateX(-50%) translateY(20px); padding: 10px 16px; border-radius: 999px; background: var(--ink); color: #fff; font-size: 13px; opacity: 0; pointer-events: none; transition: opacity .2s, transform .2s; z-index: 60; }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    @media (max-width: 1180px) {
      .layout { grid-template-columns: 264px minmax(0, 1fr); }
      .rail.right { position: static; grid-column: 1 / -1; }
      .cand-list { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 820px) {
      .layout { grid-template-columns: 1fr; }
      .rail { position: static; }
      .cat-cards, .field-grid, .cand-list { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <div class="mark">TP</div>
      <div><strong>TripProof</strong><small>자료에 묻고, 근거 있는 답변만 남깁니다</small></div>
    </div>
    <span class="variant-tag">C · 통합안</span>
    <select aria-label="여행 선택">
      <option>오사카 4박 5일 · 출발 D-3</option>
      <option>도쿄 체크인 테스트 여행</option>
    </select>
    <span class="spacer"></span>
    <div class="counters">
      <span class="pill info" id="cArtifact">자료 5</span>
      <span class="pill warn" id="cCand">후보 0</span>
      <span class="pill good" id="cBoard">대시보드 0</span>
      <span class="pill saved" id="cField">현장 0</span>
    </div>
  </header>

  <main class="layout">
    <!-- LEFT -->
    <aside class="rail">
      <section class="card-box">
        <div class="box-body">
          <div class="trip-name">오사카 4박 5일</div>
          <div class="trip-sub">자료함 기반 확인 중 · 출발 D-3</div>
          <div class="mini-stats">
            <div><strong id="sArtifact">5</strong><span>자료</span></div>
            <div><strong id="sBoard">0</strong><span>올린 카드</span></div>
            <div><strong id="sField">0</strong><span>현장</span></div>
          </div>
          <div class="add-row">
            <button class="btn primary block">자료 첨부</button>
            <button class="btn">붙여넣기</button>
          </div>
        </div>
      </section>

      <section class="card-box">
        <div class="box-head"><h2>자료함</h2><span class="sub">근거의 원천</span></div>
        <div class="box-body"><div class="lib-list" id="libList"></div></div>
      </section>
    </aside>

    <!-- CENTER -->
    <section class="main">
      <div class="tabs">
        <button class="tab active" data-tab="ask">확인 (채팅)</button>
        <button class="tab" data-tab="board">대시보드<span class="badge" id="tabBoardBadge">0</span></button>
        <button class="tab" data-tab="field">현장<span class="badge" id="tabFieldBadge">0</span></button>
      </div>

      <!-- ASK: chat + draft below -->
      <div class="view active" data-view="ask">
        <section class="card-box chat-box">
          <div class="scope-row">대상: <strong>전체 자료함 (5개)</strong> · 자료를 멘션하면 좁혀서 물어볼 수 있어요</div>
          <div class="thread" id="thread"></div>
          <div class="composer">
            <textarea id="qInput" placeholder="이번 여행 자료에 대해 물어보세요 (예: 호텔에 늦게 도착하면?)"></textarea>
            <button class="btn primary" id="askBtn">물어보기</button>
          </div>
        </section>
        <section class="card-box draft-box" id="draftBox"></section>
      </div>

      <!-- BOARD -->
      <div class="view" data-view="board">
        <section class="card-box">
          <div class="box-head"><div><h2>최종 대시보드</h2><span class="sub">사람이 올린 카드만 · 일정 순서로</span></div><span class="pill good" id="boardBadge">0</span></div>
          <div class="box-body" id="boardBody"></div>
        </section>
      </div>

      <!-- FIELD -->
      <div class="view" data-view="field">
        <div class="field-head">
          <div><h3>현장 카드</h3><p>대시보드에서 저장한 것만 · 현장에서 빠르게 보기</p></div>
          <span class="pill saved" id="fieldBadge">0</span>
        </div>
        <div id="fieldBody"></div>
      </div>
    </section>

    <!-- RIGHT: AI candidates -->
    <aside class="rail right">
      <section class="card-box">
        <div class="box-head"><div><h2>AI 추천 후보</h2><span class="sub">채팅으로 보내거나 바로 초안</span></div><span class="pill warn" id="candBadge">0</span></div>
        <div class="box-body"><div class="cand-list" id="candList"></div></div>
      </section>
    </aside>
  </main>

  <div class="toast" id="toast"></div>

  <script>
    /* ---------------- data ---------------- */
    const artifacts = [
      { id: "hotel",   name: "호텔 예약 화면",     file: "hotel-booking.png", kind: "IMG", meta: "체크인·늦은 도착·예약번호" },
      { id: "host",    name: "호스트 체크인 안내", file: "host-message.png",  kind: "IMG", meta: "출입 코드·도착 지연 연락" },
      { id: "voucher", name: "후지산 투어 바우처", file: "fuji-voucher.pdf",  kind: "PDF", meta: "모바일 바우처·집합 시간" },
      { id: "rental",  name: "렌터카 예약 약관",   file: "rental-terms.pdf",  kind: "PDF", meta: "연료 정책·보증금" },
      { id: "receipt", name: "호텔 도시세 영수증", file: "city-tax.jpg",      kind: "JPG", meta: "도시세·추가 결제 이유" }
    ];
    const artifactById = (id) => artifacts.find((a) => a.id === id);

    const phases = [
      { key: "pre",    label: "출발 전", when: "D-3" },
      { key: "day1",   label: "Day 1",  when: "도착·체크인" },
      { key: "day2",   label: "Day 2",  when: "후지산 투어" },
      { key: "day4",   label: "Day 4",  when: "렌터카 반납" },
      { key: "common", label: "공통",   when: "결제·기타" }
    ];
    const catMeta = { "숙소": { color: "#2f6bf0" }, "투어": { color: "#1f7a3d" }, "렌터카": { color: "#966200" }, "결제": { color: "#6c3fb4" } };
    const stateMeta = {
      supported:    { label: "근거 있음", cls: "good" },
      user:         { label: "직접 확인", cls: "user" },
      needs_review: { label: "확인 필요", cls: "warn" },
      missing:      { label: "근거 부족", cls: "danger" },
      conflict:     { label: "자료 충돌", cls: "warn" }
    };

    function makeCard(id, o) {
      return { id, category: o.category, phase: o.phase, title: o.title, value: o.value, state: o.state, note: o.note || "", evidence: o.evidence || [], saved: false };
    }
    const sourceNames = (c) => c.evidence.map((e) => artifactById(e.artifactId)?.name).filter(Boolean).join(" + ") || "근거 없음";

    const answerBank = {
      "호텔에 늦게 도착하면 어떻게 돼?": { body: "22:00 이후 도착하면 숙소에 미리 연락해야 합니다. 호텔 예약 화면과 호스트 메시지가 같은 조건을 말하고 있어요.", state: "supported",
        card: makeCard("lateArrival", { category: "숙소", phase: "day1", title: "늦은 도착", value: "22:00 이후 숙소 연락", state: "supported", note: "두 자료가 같은 조건을 가리킵니다.",
          evidence: [
            { artifactId: "hotel", locator: "예약 요약 · 늦은 도착 안내", snippet: "체크인 22:00 이후 도착 시 숙소로 사전 연락 바랍니다." },
            { artifactId: "host",  locator: "호스트 메시지 · 셀프 체크인", snippet: "도착이 늦어지면 메시지를 남겨 주세요. 출입 안내를 다시 보내드립니다." }
          ] }) },
      "체크인 몇 시부터야?": { body: "체크인은 15:00부터입니다. 호텔 예약 화면 예약 요약에 적혀 있어요.", state: "supported",
        card: makeCard("checkinTime", { category: "숙소", phase: "day1", title: "체크인 시간", value: "15:00", state: "supported", note: "예약 요약에 명시.",
          evidence: [{ artifactId: "hotel", locator: "예약 요약 · 체크인", snippet: "Check-in 15:00 / Check-out 11:00" }] }) },
      "투어 바우처 프린트해야 해?": { body: "프린트 없이 화면 제시로 됩니다. 바우처에 '모바일 바우처 가능'이라고 적혀 있어요.", state: "supported",
        card: makeCard("mobileVoucher", { category: "투어", phase: "day2", title: "바우처 제시", value: "모바일 바우처 가능", state: "supported", note: "프린트 불필요.",
          evidence: [{ artifactId: "voucher", locator: "바우처 2쪽 · 제시 방법", snippet: "Mobile voucher accepted. Please show this screen at the meeting point." }] }) },
      "이 영수증은 왜 낸 거야?": { body: "호텔 도시세 JPY 1,200 결제 영수증입니다. 체크인 때 낸 추가 결제예요.", state: "supported",
        card: makeCard("cityTax", { category: "결제", phase: "common", title: "도시세", value: "JPY 1,200", state: "supported", note: "체크인 시 별도 결제.",
          evidence: [
            { artifactId: "receipt", locator: "영수증 · 금액 영역", snippet: "City tax  JPY 1,200" },
            { artifactId: "hotel",   locator: "예약 요약 · 비고", snippet: "도시세는 현지에서 별도 결제됩니다." }
          ] }) },
      "렌터카 기름 채워서 반납해야 해?": { body: "네, 만탱크 반납 조건입니다(full-to-full). 반납 시 가득 채우지 않으면 차액과 수수료가 붙어요.", state: "supported",
        card: makeCard("fuelPolicy", { category: "렌터카", phase: "day4", title: "연료 정책", value: "만탱크 반납 (full-to-full)", state: "supported", note: "미충전 시 수수료.",
          evidence: [{ artifactId: "rental", locator: "약관 3조 · 연료", snippet: "Return the vehicle with a full tank. Refueling fee applies otherwise." }] }) },
      "출입 코드 뭐였지?": { body: "출입 코드는 민감 정보예요. 호스트 메시지 원문에서 직접 확인한 뒤, 필요하면 직접 채워서 카드로 올릴 수 있어요.", state: "needs_review",
        card: makeCard("doorCode", { category: "숙소", phase: "day1", title: "출입 코드", value: "", state: "needs_review", note: "민감 정보 — 원문에서 확인한 값만 입력하세요.",
          evidence: [{ artifactId: "host", locator: "호스트 메시지 · 출입 안내", snippet: "출입 코드는 도착 당일 다시 안내드립니다. (코드 본문은 가림)" }] }) },
      "투어 늦으면 환불돼?": { body: "현재 자료에서는 지각 시 환불 규정을 찾지 못했습니다. 다만 AI가 못 찾았을 수도 있으니, 직접 확인한 내용이 있으면 채워서 올릴 수 있어요.", state: "missing",
        card: makeCard("lateTourRefund", { category: "투어", phase: "day2", title: "지각 환불 규정", value: "", state: "missing", note: "AI 근거 미발견 — 직접 확인한 내용을 입력하세요.",
          evidence: [] }) }
    };

    const candidates = [
      answerBank["호텔에 늦게 도착하면 어떻게 돼?"].card,
      answerBank["투어 바우처 프린트해야 해?"].card,
      answerBank["렌터카 기름 채워서 반납해야 해?"].card,
      answerBank["이 영수증은 왜 낸 거야?"].card,
      answerBank["출입 코드 뭐였지?"].card,
      answerBank["투어 늦으면 환불돼?"].card
    ];
    const candQ = {
      lateArrival: "호텔에 늦게 도착하면 어떻게 돼?",
      mobileVoucher: "투어 바우처 프린트해야 해?",
      fuelPolicy: "렌터카 기름 채워서 반납해야 해?",
      cityTax: "이 영수증은 왜 낸 거야?",
      doorCode: "출입 코드 뭐였지?",
      lateTourRefund: "투어 늦으면 환불돼?"
    };

    /* ---------------- state ---------------- */
    let view = "ask";
    let seq = 0;
    const nextId = () => "m" + (++seq);
    const expandedEv = new Set();
    const candEv = new Set();
    let draft = null;
    const thread = [{ id: nextId(), role: "ai", kind: "intro" }];
    const board = []; // 사람이 올린 카드만 — seed 없이 빈 상태에서 시작

    const $ = (s) => document.querySelector(s);
    const esc = (v) => String(v).replace(/[&<>"']/g, (m) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;" }[m]));
    const onBoard = (id) => board.some((c) => c.id === id);

    /* ---------------- render ---------------- */
    function renderAll() { renderCounters(); renderTabs(); renderLibrary(); renderCandidates(); renderThread(); renderDraft(); renderBoard(); renderField(); }

    function renderCounters() {
      const saved = board.filter((c) => c.saved).length;
      $("#cArtifact").textContent = `자료 ${artifacts.length}`;
      $("#cCand").textContent = `후보 ${candidates.length}`;
      $("#cBoard").textContent = `대시보드 ${board.length}`;
      $("#cField").textContent = `현장 ${saved}`;
      $("#sArtifact").textContent = artifacts.length;
      $("#sBoard").textContent = board.length;
      $("#sField").textContent = saved;
      $("#candBadge").textContent = candidates.length;
      $("#boardBadge").textContent = board.length;
      $("#fieldBadge").textContent = saved;
      $("#tabBoardBadge").textContent = board.length;
      $("#tabFieldBadge").textContent = saved;
    }

    function renderTabs() {
      document.querySelectorAll(".tab").forEach((t) => t.classList.toggle("active", t.dataset.tab === view));
      document.querySelectorAll(".view").forEach((v) => v.classList.toggle("active", v.dataset.view === view));
    }

    function renderLibrary() {
      $("#libList").innerHTML = artifacts.map((a) => `
        <button class="lib-item" data-artifact="${a.id}">
          <span class="file-badge">${a.kind}</span>
          <span><strong>${a.name}</strong><span>${a.meta}</span></span>
        </button>`).join("");
    }

    function evHtml(c) {
      if (!c.evidence.length) return `<div class="ev-none">이 답변에는 자료 근거가 없습니다. AI가 못 찾았을 수 있으니 직접 확인이 필요해요.</div>`;
      return `<div class="ev-list">${c.evidence.map((e) => {
        const art = artifactById(e.artifactId);
        return `<div class="ev-item"><div class="ev-head"><span class="file-badge" style="width:26px;height:30px">${art?.kind || "DOC"}</span><div><strong>${art?.name || e.artifactId}</strong><div class="ev-loc">${e.locator}</div></div></div><div class="ev-snippet">${esc(e.snippet)}</div></div>`;
      }).join("")}</div>`;
    }

    function renderCandidates() {
      $("#candList").innerHTML = candidates.map((c) => {
        const sm = stateMeta[c.state] || stateMeta.supported;
        const added = onBoard(c.id);
        const open = candEv.has(c.id);
        const stageBtn = added
          ? `<button class="btn sm" disabled>대시보드에 있음 ✓</button>`
          : `<button class="btn ${c.state === "supported" ? "primary" : ""} sm" data-stage-cand="${c.id}">카드 초안</button>`;
        return `
          <div class="cand-card">
            <div class="cc-title"><span class="cat" style="color:${catMeta[c.category]?.color}">${c.category}</span> · ${c.title}</div>
            <div class="cc-value">${c.value || "값 미정 · 직접 확인"}</div>
            <div class="answer-top"><span class="pill ${sm.cls}">${sm.label}</span></div>
            ${open ? evHtml(c) : ""}
            <div class="cc-actions">
              <button class="btn sm ghost" data-cand-ev="${c.id}">${open ? "근거 접기" : "근거"}</button>
              <button class="btn sm ghost" data-ask-cand="${c.id}">채팅으로</button>
              ${stageBtn}
            </div>
          </div>`;
      }).join("");
    }

    function renderThread() {
      $("#thread").innerHTML = thread.map((m) => {
        if (m.role === "user") return `<div class="msg user"><div class="bubble-user">${esc(m.text)}</div></div>`;
        if (m.kind === "intro") return `
          <div class="msg msg-ai"><div class="who"><span class="ai-dot">TP</span> TripProof</div>
            <div class="answer" style="background:var(--surface-soft);border-color:var(--line)">
              <div class="answer-body">자료 5개를 읽었어요. 오른쪽 <strong>추천 후보</strong>를 채팅으로 보내거나 바로 카드 초안으로 만들 수 있고, 아래에 직접 물어봐도 됩니다. 답변에는 근거와 상태가 함께 붙어요.</div>
            </div></div>`;
        if (m.kind === "thinking") return `
          <div class="msg msg-ai"><div class="who"><span class="ai-dot">TP</span> TripProof</div>
            <div class="answer"><div class="typing"><i></i><i></i><i></i></div></div></div>`;
        return renderAnswer(m);
      }).join("");
      $("#thread").scrollTop = $("#thread").scrollHeight;
    }

    function renderAnswer(m) {
      const a = m.answer, c = a.card;
      const sm = stateMeta[a.state] || stateMeta.supported;
      const open = expandedEv.has(m.id);
      const added = onBoard(c.id);
      // C: drafting is never blocked by state. Only label/style changes.
      let stageBtn = "";
      if (added) {
        stageBtn = `<button class="btn sm" disabled>대시보드에 있음 ✓</button>`;
      } else if (a.state === "supported") {
        stageBtn = `<button class="btn primary sm" data-stage-answer="${m.id}">카드 초안으로</button>`;
      } else {
        stageBtn = `<button class="btn sm" data-stage-answer="${m.id}">직접 채워 카드 초안</button>`;
      }
      return `
        <div class="msg msg-ai"><div class="who"><span class="ai-dot">TP</span> TripProof</div>
          <div class="answer">
            <div class="answer-top">
              <span class="pill ${sm.cls}"><span class="dot"></span>${sm.label}</span>
              <span class="pill"><span style="color:${catMeta[c.category]?.color}">●</span> ${c.category} · ${c.title}</span>
            </div>
            <div class="answer-body">${a.body}</div>
            <button class="ev-toggle ${open ? "open" : ""}" data-toggle-ev="${m.id}"><span class="caret">▸</span> 근거 ${c.evidence.length}개 ${open ? "접기" : "펼치기"}</button>
            ${open ? evHtml(c) : ""}
            <div class="answer-actions">${stageBtn}</div>
          </div></div>`;
    }

    function renderDraft() {
      if (!draft) {
        $("#draftBox").innerHTML = `
          <div class="box-head"><div><h2>카드 초안</h2><span class="sub">답변·후보를 고르면 여기서 확인하고 올립니다</span></div><span class="pill info">대기</span></div>
          <div class="box-body"><div class="empty"><strong>아직 선택한 답변이 없습니다</strong><p>채팅 답변의 '카드 초안으로' 또는 오른쪽 추천 후보의 '카드 초안'을 누르세요.</p></div></div>`;
        return;
      }
      const c = draft, sm = stateMeta[c.state] || stateMeta.supported;
      const phaseOpts = phases.map((p) => `<option value="${p.key}" ${p.key === c.phase ? "selected" : ""}>${p.label} · ${p.when}</option>`).join("");
      const catOpts = Object.keys(catMeta).map((k) => `<option value="${k}" ${k === c.category ? "selected" : ""}>${k}</option>`).join("");
      let caution = "";
      if (c.state === "missing") caution = `<div class="draft-caution">⚠ <span><strong>근거 부족.</strong> AI가 자료에서 못 찾았을 뿐일 수 있어요. 직접 확인한 값을 넣으면 <strong>'직접 확인'</strong> 카드로 올라갑니다.</span></div>`;
      else if (c.state === "needs_review") caution = `<div class="draft-caution danger">⚠ <span><strong>민감 정보.</strong> 원문에서 직접 확인한 값만 입력하세요. 올리면 <strong>'직접 확인'</strong> 카드가 됩니다.</span></div>`;
      const editClass = c.state === "supported" ? "" : "edit";
      $("#draftBox").innerHTML = `
        <div class="box-head"><div><h2>카드 초안</h2><span class="sub">${c.note || "내용을 확인하고 올리세요"}</span></div><span class="pill ${sm.cls}">${sm.label}</span></div>
        <div class="box-body" style="display:grid;gap:11px">
          ${caution}
          <div class="draft-grid">
            <div class="field"><span>카테고리</span><select data-draft="category">${catOpts}</select></div>
            <div class="field"><span>일정</span><select data-draft="phase">${phaseOpts}</select></div>
            <div class="field ${editClass}"><span>카드 이름</span><input data-draft="title" value="${esc(c.title)}" placeholder="카드 이름" /></div>
            <div class="field ${editClass}"><span>값</span><input data-draft="value" value="${esc(c.value)}" placeholder="${c.state === "supported" ? "" : "직접 확인한 값 입력"}" /></div>
          </div>
          <div class="field"><span>근거</span><strong>${sourceNames(c)}</strong></div>
          <div class="answer-actions">
            <button class="btn primary" id="confirmDraft">대시보드에 올리기</button>
            <button class="btn ghost" id="cancelDraft">초안 닫기</button>
          </div>
        </div>`;
    }

    function renderBoard() {
      if (!board.length) { $("#boardBody").innerHTML = `<div class="empty"><strong>아직 올린 카드가 없습니다</strong><p>초안을 확정하면 일정 순서로 쌓입니다.</p></div>`; return; }
      const used = phases.filter((p) => board.some((c) => c.phase === p.key));
      $("#boardBody").innerHTML = used.map((p, i) => {
        const inPhase = board.filter((c) => c.phase === p.key);
        const cats = [...new Set(inPhase.map((c) => c.category))];
        const last = i === used.length - 1;
        return `
          <div class="phase-rail">
            <div class="phase-line"><span class="knob"></span>${last ? "" : '<span class="stem"></span>'}</div>
            <div class="phase-block">
              <div class="phase-head"><h3>${p.label}</h3><span class="when">${p.when}</span></div>
              ${cats.map((cat) => `
                <div class="cat-group">
                  <div class="cat-label"><span style="color:${catMeta[cat]?.color}">●</span> ${cat}</div>
                  <div class="cat-cards">${inPhase.filter((c) => c.category === cat).map(renderBoardCard).join("")}</div>
                </div>`).join("")}
            </div>
          </div>`;
      }).join("");
    }

    function renderBoardCard(c) {
      const sm = stateMeta[c.state] || stateMeta.supported;
      const evBtn = c.evidence.length
        ? `<button class="btn sm ghost" data-board-ev="${c.id}">근거</button>`
        : `<button class="btn sm ghost" disabled>근거 없음</button>`;
      return `
        <div class="board-card ${c.saved ? "saved-card" : ""}">
          <div class="bc-top"><h4>${c.title}</h4>
            <span class="bc-pills"><span class="pill ${sm.cls}">${sm.label}</span>${c.saved ? `<span class="pill saved">현장 저장</span>` : ""}</span>
          </div>
          <div class="bc-value">${c.value || "—"}</div>
          <div class="bc-actions">
            ${evBtn}
            <button class="btn sm ${c.saved ? "" : "primary"}" data-save-field="${c.id}" ${c.saved ? "disabled" : ""}>${c.saved ? "저장됨" : "현장 저장"}</button>
          </div>
        </div>`;
    }

    function renderField() {
      const saved = board.filter((c) => c.saved);
      if (!saved.length) { $("#fieldBody").innerHTML = `<div class="empty" style="margin-top:14px"><strong>현장 카드가 비어 있습니다</strong><p>대시보드에서 '현장 저장'을 누른 카드만 여기에 모입니다.</p></div>`; return; }
      const used = phases.filter((p) => saved.some((c) => c.phase === p.key));
      $("#fieldBody").innerHTML = `<div style="display:grid;gap:14px;margin-top:14px">` + used.map((p) => `
        <div class="field-phase">
          <h4>${p.label} · ${p.when}</h4>
          <div class="field-grid">
            ${saved.filter((c) => c.phase === p.key).map((c) => {
              const sm = stateMeta[c.state] || stateMeta.supported;
              return `
              <div class="field-card">
                <div class="fc-row"><span class="fc-cat" style="color:${catMeta[c.category]?.color}">● ${c.category}</span><span class="pill ${sm.cls}">${sm.label}</span></div>
                <span class="fc-title">${c.title}</span>
                <span class="fc-value">${c.value || "—"}</span>
              </div>`;
            }).join("")}
          </div>
        </div>`).join("") + `</div>`;
    }

    /* ---------------- actions ---------------- */
    let toastTimer = null;
    function toast(msg) { const t = $("#toast"); t.textContent = msg; t.classList.add("show"); clearTimeout(toastTimer); toastTimer = setTimeout(() => t.classList.remove("show"), 1800); }

    function ask(qRaw) {
      const q = qRaw.trim(); if (!q) return;
      view = "ask"; renderTabs();
      thread.push({ id: nextId(), role: "user", text: q });
      const thinkId = nextId();
      thread.push({ id: thinkId, role: "ai", kind: "thinking" });
      renderThread();
      const fbId = "fb" + nextId(); // 콜백 시점 seq가 아니라 호출 시점에 고유 id 고정
      setTimeout(() => {
        const idx = thread.findIndex((m) => m.id === thinkId);
        const found = answerBank[q];
        const answer = found || { body: "현재 자료에서는 이 질문에 답할 근거를 찾지 못했습니다. AI가 못 찾았을 수도 있으니, 직접 확인한 내용이 있으면 채워서 올릴 수 있어요.", state: "missing",
          card: makeCard(fbId, { category: "결제", phase: "common", title: "추가 확인", value: "", state: "missing", note: "AI 근거 미발견 — 직접 확인한 내용을 입력하세요.", evidence: [] }) };
        thread[idx] = { id: thinkId, role: "ai", kind: "answer", answer };
        renderThread();
      }, 600);
    }

    function stage(srcCard) {
      if (!srcCard) return;
      if (onBoard(srcCard.id)) { toast("이미 대시보드에 있어요"); return; }
      if (draft && draft.value && draft.value.trim()) toast("이전 초안을 새 카드로 교체했어요");
      draft = { ...srcCard, _orig: { title: srcCard.title, value: srcCard.value } };
      view = "ask"; renderTabs();
      renderDraft();
      $("#draftBox").scrollIntoView({ behavior: "smooth", block: "center" });
    }

    function confirmDraft() {
      if (!draft) return;
      if (onBoard(draft.id)) { draft = null; renderAll(); return; }
      if (!draft.value || !draft.value.trim()) { toast("값을 입력해야 대시보드에 올릴 수 있어요"); return; }
      const committed = { ...draft };
      const orig = committed._orig || {};
      delete committed._orig;
      // 정직성: 근거 없는 카드, 또는 근거 있음(supported)인데 사람이 값·이름을 고친 카드는
      // 'user(직접 확인)'으로 강등한다. 근거 있음 보증은 사람이 고치면 더 이상 유효하지 않다.
      const edited = committed.title !== orig.title || committed.value !== orig.value;
      if (committed.state !== "supported" || edited) {
        committed.state = "user";
        committed.note = "사용자가 직접 확인해 입력";
      }
      board.push(committed);
      draft = null;
      view = "board"; // C: 올리기 → 대시보드로 이동
      renderAll();
      $("#boardBody")?.scrollIntoView?.({ behavior: "smooth", block: "start" });
      toast("대시보드에 올렸어요");
    }

    function saveField(id) {
      const c = board.find((x) => x.id === id);
      if (!c) return;
      c.saved = true; renderAll(); toast("현장 카드로 저장했어요");
    }

    /* ---------------- events ---------------- */
    document.body.addEventListener("click", (e) => {
      const tab = e.target.closest("[data-tab]");
      if (tab) { view = tab.dataset.tab; renderTabs(); return; }

      const artifact = e.target.closest("[data-artifact]");
      if (artifact) { toast(`${artifactById(artifact.dataset.artifact)?.name} — 질문에 멘션해 자료를 좁힐 수 있어요`); return; }

      const askCand = e.target.closest("[data-ask-cand]");
      if (askCand) { ask(candQ[askCand.dataset.askCand]); return; }

      const candEvBtn = e.target.closest("[data-cand-ev]");
      if (candEvBtn) { const id = candEvBtn.dataset.candEv; candEv.has(id) ? candEv.delete(id) : candEv.add(id); renderCandidates(); return; }

      const stageCand = e.target.closest("[data-stage-cand]");
      if (stageCand) { stage(candidates.find((c) => c.id === stageCand.dataset.stageCand)); return; }

      const stageAnswer = e.target.closest("[data-stage-answer]");
      if (stageAnswer) { const m = thread.find((x) => x.id === stageAnswer.dataset.stageAnswer); if (m?.answer) stage(m.answer.card); return; }

      const ev = e.target.closest("[data-toggle-ev]");
      if (ev) { const id = ev.dataset.toggleEv; expandedEv.has(id) ? expandedEv.delete(id) : expandedEv.add(id); renderThread(); return; }

      const bev = e.target.closest("[data-board-ev]");
      if (bev) { const c = board.find((x) => x.id === bev.dataset.boardEv); if (c) toast(`근거: ${sourceNames(c)}`); return; }

      const sf = e.target.closest("[data-save-field]");
      if (sf) { saveField(sf.dataset.saveField); return; }

      if (e.target.id === "askBtn") { ask($("#qInput").value); $("#qInput").value = ""; return; }
      if (e.target.id === "confirmDraft") { confirmDraft(); return; }
      if (e.target.id === "cancelDraft") { draft = null; renderDraft(); return; }
    });

    // live-bind draft edits without re-render (keep input focus)
    document.body.addEventListener("input", (e) => {
      const f = e.target.closest("[data-draft]");
      if (f && draft) draft[f.dataset.draft] = e.target.value;
    });
    document.body.addEventListener("change", (e) => {
      const f = e.target.closest("[data-draft]");
      if (f && draft) draft[f.dataset.draft] = e.target.value;
    });

    $("#qInput").addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); ask(e.target.value); e.target.value = ""; }
    });

    renderAll();
  </script>
</body>
</html>
