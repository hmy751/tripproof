<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TripProof Trust Board Preview</title>
  <style>
    :root {
      --bg: #f4f6f8;
      --surface: #ffffff;
      --surface-soft: #f9fbfc;
      --surface-strong: #edf2f5;
      --ink: #172026;
      --muted: #65727d;
      --line: #d9e1e7;
      --line-strong: #afbdc8;
      --blue: #276ef1;
      --blue-soft: #e8f0ff;
      --green: #24763c;
      --green-soft: #e7f6eb;
      --amber: #9b6300;
      --amber-soft: #fff1d8;
      --red: #b72d2d;
      --red-soft: #ffe8e8;
      --purple: #6f3eb5;
      --purple-soft: #f0e9ff;
      --shadow: 0 12px 28px rgb(23 32 38 / 7%);
      --radius: 8px;
      --sans: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      --mono: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--ink);
      font-family: var(--sans);
      font-size: 14px;
      line-height: 1.45;
    }

    button,
    textarea,
    select {
      font: inherit;
    }

    button {
      min-height: 34px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: var(--surface);
      color: var(--ink);
      padding: 0 12px;
      cursor: pointer;
    }

    button:hover {
      border-color: var(--line-strong);
    }

    button:disabled {
      cursor: default;
      opacity: 0.62;
    }

    textarea {
      width: 100%;
      min-height: 78px;
      resize: vertical;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 10px;
      background: var(--surface);
      color: var(--ink);
    }

    h1,
    h2,
    h3,
    p {
      margin: 0;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      display: grid;
      grid-template-columns: minmax(260px, 420px) minmax(220px, 1fr) auto;
      gap: 18px;
      align-items: center;
      min-height: 64px;
      padding: 0 22px;
      border-bottom: 1px solid var(--line);
      background: rgb(255 255 255 / 94%);
      backdrop-filter: blur(16px);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .mark {
      display: grid;
      place-items: center;
      width: 36px;
      height: 36px;
      border-radius: var(--radius);
      background: var(--ink);
      color: #fff;
      font-family: var(--mono);
      font-weight: 800;
    }

    .brand strong,
    .brand span {
      display: block;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .brand span,
    .muted,
    .panel-head p,
    .source-card span,
    .item-meta,
    .item-source,
    .saved-empty,
    .source-caption,
    .answer-panel p,
    .state-column small,
    .situation-head small,
    .field-item span {
      color: var(--muted);
      font-size: 12px;
    }

    .topbar select {
      width: min(100%, 360px);
      height: 36px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: var(--surface);
      color: var(--ink);
      padding: 0 10px;
    }

    .status-strip,
    .button-row,
    .chip-row,
    .item-actions,
    .answer-actions,
    .source-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      min-height: 26px;
      padding: 0 9px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--surface);
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    .pill.info {
      border-color: #bfd1ff;
      background: var(--blue-soft);
      color: var(--blue);
    }

    .pill.good {
      border-color: #b9dfc4;
      background: var(--green-soft);
      color: var(--green);
    }

    .pill.warn {
      border-color: #f0cf90;
      background: var(--amber-soft);
      color: var(--amber);
    }

    .pill.danger {
      border-color: #f2b5b5;
      background: var(--red-soft);
      color: var(--red);
    }

    .pill.saved {
      border-color: #d6c4ff;
      background: var(--purple-soft);
      color: var(--purple);
    }

    .primary {
      border-color: var(--blue);
      background: var(--blue);
      color: #fff;
      font-weight: 700;
    }

    .quiet {
      background: var(--surface-soft);
    }

    .workspace {
      display: grid;
      grid-template-columns: 268px minmax(0, 1fr) 340px;
      gap: 16px;
      max-width: 1480px;
      margin: 0 auto;
      padding: 18px 22px 32px;
    }

    .side-rail,
    .inspector {
      position: sticky;
      top: 82px;
      align-self: start;
      display: grid;
      gap: 12px;
    }

    .main-stack,
    .board-stack,
    .source-list,
    .saved-list,
    .trust-board,
    .state-column,
    .source-table,
    .probe-panel {
      display: grid;
      gap: 12px;
      align-content: start;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
      box-shadow: var(--shadow);
    }

    .panel.slim {
      box-shadow: none;
    }

    .panel-head {
      display: flex;
      align-items: start;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
    }

    .panel-head h1 {
      margin-top: 2px;
      font-size: 25px;
      line-height: 1.18;
      letter-spacing: 0;
    }

    .panel-head h2 {
      font-size: 16px;
      line-height: 1.25;
    }

    .panel-body {
      padding: 14px;
    }

    .trip-summary {
      display: grid;
      gap: 12px;
    }

    .trip-summary h2 {
      font-size: 17px;
      line-height: 1.25;
    }

    .mini-summary {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 6px;
    }

    .mini-summary div,
    .status-card {
      display: grid;
      gap: 2px;
      padding: 9px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: var(--surface-soft);
    }

    .mini-summary strong,
    .status-card strong {
      font-size: 17px;
      line-height: 1.1;
    }

    .source-card {
      display: grid;
      grid-template-columns: 38px minmax(0, 1fr);
      gap: 10px;
      align-items: start;
      min-height: 72px;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
      text-align: left;
    }

    .file-badge {
      display: grid;
      place-items: center;
      width: 38px;
      height: 44px;
      border-radius: 6px;
      background: var(--surface-strong);
      color: var(--muted);
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 800;
    }

    .source-card strong,
    .source-card span {
      display: block;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .source-tags {
      margin-top: 7px;
    }

    .source-tags .pill {
      min-height: 22px;
      padding: 0 7px;
      font-size: 11px;
    }

    .status-overview {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 10px;
      padding: 14px;
    }

    .status-card {
      min-height: 70px;
    }

    .status-card span {
      color: var(--muted);
      font-size: 12px;
    }

    .status-card.good {
      border-color: #b9dfc4;
      background: var(--green-soft);
    }

    .status-card.warn {
      border-color: #f0cf90;
      background: var(--amber-soft);
    }

    .status-card.danger {
      border-color: #f2b5b5;
      background: var(--red-soft);
    }

    .status-card.saved {
      border-color: #d6c4ff;
      background: var(--purple-soft);
    }

    .trust-board {
      gap: 14px;
    }

    .situation-card {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
      overflow: hidden;
    }

    .situation-card.active {
      border-color: var(--blue);
      outline: 1px solid var(--blue);
    }

    .situation-head {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
      padding: 14px;
      border-bottom: 1px solid var(--line);
      background: var(--surface-soft);
    }

    .situation-head h2 {
      margin: 4px 0 2px;
      font-size: 18px;
      line-height: 1.25;
    }

    .state-groups {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 1px;
      background: var(--line);
    }

    .state-column {
      min-width: 0;
      padding: 10px;
      background: var(--surface);
    }

    .state-column header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      min-height: 30px;
      margin-bottom: 8px;
    }

    .state-column h3 {
      font-size: 12px;
      line-height: 1.2;
    }

    .check-item {
      display: grid;
      gap: 7px;
      width: 100%;
      min-height: 110px;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: var(--surface-soft);
      text-align: left;
    }

    .check-item + .check-item {
      margin-top: 8px;
    }

    .check-item:hover,
    .check-item.active {
      border-color: var(--blue);
      background: var(--blue-soft);
    }

    .check-item h4 {
      margin: 0;
      font-size: 13px;
      line-height: 1.2;
    }

    .item-value {
      display: block;
      color: var(--ink);
      font-size: 15px;
      font-weight: 800;
      overflow-wrap: anywhere;
    }

    .item-meta,
    .item-source {
      overflow-wrap: anywhere;
    }

    .empty-lane {
      display: grid;
      place-items: center;
      min-height: 54px;
      border: 1px dashed var(--line);
      border-radius: 7px;
      color: var(--muted);
      font-size: 12px;
      text-align: center;
    }

    .source-preview {
      display: grid;
      gap: 10px;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #edf2f5;
    }

    .source-page {
      display: grid;
      gap: 8px;
      min-height: 164px;
      padding: 18px;
      border: 1px solid #c8d2db;
      border-radius: 6px;
      background: #fff;
    }

    .line {
      display: block;
      height: 10px;
      border-radius: 999px;
      background: #d6dde4;
    }

    .line.dark {
      width: 48%;
      height: 12px;
      background: #24313a;
    }

    .line.mid {
      width: 76%;
    }

    .line.short {
      width: 55%;
    }

    .source-highlight {
      display: grid;
      gap: 8px;
      margin-top: 8px;
      padding: 12px;
      border: 2px solid rgb(39 110 241 / 76%);
      border-radius: 7px;
      background: rgb(39 110 241 / 8%);
    }

    .source-table {
      gap: 1px;
      margin-top: 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      overflow: hidden;
      background: var(--line);
    }

    .source-row {
      display: grid;
      grid-template-columns: 84px minmax(0, 1fr);
      gap: 10px;
      padding: 9px 11px;
      background: var(--surface);
    }

    .source-row dt {
      color: var(--muted);
      font-size: 12px;
    }

    .source-row dd {
      margin: 0;
      overflow-wrap: anywhere;
    }

    code {
      font-family: var(--mono);
      font-size: 12px;
      white-space: normal;
    }

    .probe-panel {
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
      box-shadow: var(--shadow);
    }

    .probe-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 300px;
      gap: 12px;
      align-items: start;
    }

    .suggestion-button {
      min-height: 30px;
      padding: 0 10px;
      border-radius: 999px;
      background: var(--surface-soft);
      font-size: 12px;
    }

    .answer-panel {
      display: grid;
      gap: 10px;
      min-height: 124px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface-soft);
    }

    .answer-panel h3 {
      font-size: 15px;
      line-height: 1.3;
    }

    .field-item {
      display: grid;
      gap: 2px;
      padding: 9px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: rgb(255 255 255 / 78%);
    }

    .field-item strong {
      overflow-wrap: anywhere;
    }

    @media (max-width: 1240px) {
      .workspace {
        grid-template-columns: 250px minmax(0, 1fr);
      }

      .inspector {
        position: static;
        grid-column: 2;
      }

      .state-groups {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
    }

    @media (max-width: 920px) {
      .workspace,
      .probe-grid {
        grid-template-columns: 1fr;
      }

      .side-rail,
      .inspector {
        position: static;
        grid-column: auto;
      }

      .status-overview {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 720px) {
      body {
        font-size: 16px;
      }

      .topbar,
      .state-groups {
        grid-template-columns: 1fr;
      }

      .topbar {
        gap: 12px;
        padding: 14px 16px;
      }

      .workspace {
        padding: 14px 12px 28px;
      }

      .status-overview {
        grid-template-columns: 1fr;
      }

      .situation-head,
      .source-row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <div class="mark">TP</div>
      <div>
        <strong>TripProof</strong>
        <span>여행 자료를 상황별 신뢰 상태로 검증합니다</span>
      </div>
    </div>
    <select aria-label="여행 선택">
      <option>오사카 4박 5일 · 출발 D-3</option>
      <option>도쿄 체크인 테스트 여행</option>
    </select>
    <div class="status-strip">
      <span class="pill info" id="artifactCount">자료 5개</span>
      <span class="pill good" id="supportedCount">확인됨 0</span>
      <span class="pill warn" id="reviewCount">확인 필요 0</span>
      <span class="pill saved" id="savedCount">저장됨 0</span>
    </div>
  </header>

  <main class="workspace">
    <aside class="side-rail">
      <section class="panel trip-summary">
        <div class="panel-head">
          <div>
            <h2>오사카 4박 5일</h2>
            <p>출발 D-3 · 자료 검증 중</p>
          </div>
        </div>
        <div class="panel-body trip-summary">
          <div class="mini-summary">
            <div><strong id="sideArtifactCount">5</strong><span class="muted">자료</span></div>
            <div><strong id="sideIssueCount">0</strong><span class="muted">확인할 것</span></div>
            <div><strong id="sideSavedCount">0</strong><span class="muted">현장</span></div>
          </div>
          <div class="button-row">
            <button class="primary">자료 추가</button>
            <button>메시지 붙여넣기</button>
          </div>
        </div>
      </section>

      <section class="panel">
        <div class="panel-head">
          <div>
            <h2>자료함</h2>
            <p>원본과 근거 연결</p>
          </div>
        </div>
        <div class="panel-body">
          <div class="source-list" id="sourceList"></div>
        </div>
      </section>

      <section class="panel">
        <div class="panel-head">
          <div>
            <h2>현장 카드</h2>
            <p>저장한 정보만</p>
          </div>
          <span class="pill saved" id="fieldBadge">0</span>
        </div>
        <div class="panel-body">
          <div class="saved-list" id="fieldList"></div>
        </div>
      </section>
    </aside>

    <section class="main-stack">
      <section class="panel">
        <div class="panel-head">
          <div>
            <p class="muted">상황별 신뢰 상태</p>
            <h1>이 정보를 믿고 행동해도 되는가</h1>
            <p>AI가 먼저 찾은 항목과 사용자의 질문 답변을 같은 보드가 아니라 같은 신뢰 축 위에서 다룹니다.</p>
          </div>
          <span class="pill info">검증 보드</span>
        </div>
        <div class="status-overview" id="statusOverview"></div>
      </section>

      <section class="trust-board" id="trustBoard"></section>

      <section class="probe-panel">
        <div class="panel-head" style="padding:0 0 12px;border-bottom:0">
          <div>
            <h2>자료에 묻기</h2>
            <p>현재 선택: <strong id="probeContext">숙소 체크인</strong></p>
          </div>
          <span class="pill info">질문 probe</span>
        </div>
        <div class="probe-grid">
          <div class="probe-panel slim" style="padding:0;border:0;box-shadow:none">
            <textarea id="questionInput">호텔에 늦게 도착하면 어떻게 돼?</textarea>
            <div class="chip-row" id="questionSuggestions"></div>
            <div class="button-row">
              <button class="primary" id="askButton">자료 안에서 답 찾기</button>
            </div>
          </div>
          <div id="answerSlot"></div>
        </div>
      </section>
    </section>

    <aside class="inspector">
      <section class="panel" id="inspectorPanel"></section>
    </aside>
  </main>

  <script>
    const artifacts = [
      { id: "hotel", name: "호텔 예약 화면", file: "hotel-booking-screenshot.png", kind: "IMG", kindLabel: "이미지", linked: ["숙소 체크인", "결제 확인"], meta: "체크인 시간, 늦은 도착, 예약번호" },
      { id: "host", name: "호스트 체크인 안내", file: "host-message-capture.png", kind: "IMG", kindLabel: "이미지", linked: ["숙소 체크인"], meta: "출입 코드, 도착 지연 연락" },
      { id: "voucher", name: "후지산 투어 바우처", file: "fuji-tour-voucher.pdf", kind: "PDF", kindLabel: "PDF", linked: ["투어 출발"], meta: "모바일 바우처, 집합 시간, 장소" },
      { id: "rental", name: "렌터카 예약 약관", file: "rental-car-terms.pdf", kind: "PDF", kindLabel: "PDF", linked: ["렌터카 반납"], meta: "연료 정책, 보증금 조건" },
      { id: "receipt", name: "호텔 도시세 영수증", file: "hotel-city-tax-receipt.jpg", kind: "JPG", kindLabel: "영수증", linked: ["숙소 체크인", "결제 확인"], meta: "도시세, 추가 결제 이유" }
    ];

    const situations = [
      { id: "checkin", title: "숙소 체크인", badge: "숙소", meta: "5월 12일 · 신주쿠", description: "도착 전에 시간, 연락 조건, 민감 정보를 가릅니다.", sourceIds: ["hotel", "host", "receipt"] },
      { id: "tour", title: "투어 출발", badge: "액티비티", meta: "5월 13일 · 도쿄 출발", description: "바우처 제시, 집합 시간, 지각 규정을 확인합니다.", sourceIds: ["voucher"] },
      { id: "rental", title: "렌터카 반납", badge: "렌터카", meta: "5월 14일 · 가와구치코", description: "연료 정책과 보증금 조건을 반납 전에 확인합니다.", sourceIds: ["rental"] },
      { id: "payment", title: "결제 확인", badge: "정산", meta: "여행 후 · 영수증 대조", description: "추가 결제 이유와 예약 조건을 대조합니다.", sourceIds: ["hotel", "receipt"] }
    ];

    const checkItems = [
      item("checkinTime", "checkin", "체크인 시간", "15:00", "supported", "호텔 예약 화면", "hotel", "예약 요약 영역", "체크인 15:00. 22:00 이후 도착 시 숙소 연락 필요.", "체크인 전 바로 써도 되는 값입니다.", true),
      item("lateArrival", "checkin", "늦은 도착", "22:00 이후 숙소 연락 필요", "supported", "호텔 예약 화면 + 호스트 체크인 안내", "hotel", "늦은 도착 안내", "22:00 이후 도착 시 숙소 연락 필요. 호스트 메시지에도 같은 조건이 있습니다.", "두 자료가 같은 행동을 말합니다."),
      item("bookingNumber", "checkin", "예약번호", "****1234", "needs_review", "호텔 예약 화면", "hotel", "예약번호 영역", "예약번호는 화면에 있지만 공개 값은 마스킹했습니다.", "민감 정보라 원문에서 직접 확인합니다.", false, false),
      item("doorCode", "checkin", "출입 코드", "원문 직접 확인", "needs_review", "호스트 체크인 안내", "host", "셀프 체크인 안내", "출입 코드는 민감 정보라 원문에서 직접 확인해야 합니다.", "숙소 앞에서 원문을 열어 확인합니다.", false, false),
      item("cityTax", "checkin", "도시세", "JPY 1,200", "supported", "호텔 도시세 영수증", "receipt", "금액 표시 영역", "체크인 시 도시세 JPY 1,200 결제.", "현장 결제 참고 정보입니다."),
      item("mobileVoucher", "tour", "바우처 제시", "모바일 바우처 가능", "supported", "후지산 투어 바우처", "voucher", "2쪽 바우처 조건", "Mobile voucher accepted.", "프린트 없이 보여줄 수 있습니다.", true),
      item("meetTime", "tour", "집합 시간", "08:45", "supported", "후지산 투어 바우처", "voucher", "1쪽 집합 안내", "Arrive 15 minutes before departure at 09:00.", "출발 전 도착해야 하는 시간입니다."),
      item("meetPlace", "tour", "집합 장소", "Shinjuku Center Building 1F", "needs_review", "후지산 투어 바우처", "voucher", "1쪽 집합 장소", "Meet at Shinjuku Center Building 1F.", "건물명은 있으나 정확한 입구는 직접 확인이 좋습니다."),
      item("lateTour", "tour", "지각 환불 규정", "근거 부족", "missing", "현재 자료", "voucher", "자료 전체", "지각 시 대기 여부나 환불 규정은 현재 자료에서 찾지 못했습니다.", "관련 약관이나 취소 규정 자료가 더 필요합니다.", false, false),
      item("fuel", "rental", "연료 정책", "가득 채워 반납", "supported", "렌터카 예약 약관", "rental", "4쪽 연료 정책 표", "Return with a full tank.", "반납 전 행동으로 옮길 수 있는 조건입니다."),
      item("deposit", "rental", "보증금", "JPY 50,000 보류 가능", "needs_review", "렌터카 예약 약관", "rental", "3쪽 보증금 안내", "Deposit up to JPY 50,000 may be held.", "결제 수단과 실제 청구 여부를 직접 확인해야 합니다."),
      item("returnGate", "rental", "반납 위치", "근거 부족", "missing", "현재 자료", "rental", "자료 전체", "정확한 반납 게이트나 주차장 입구는 현재 자료에서 찾지 못했습니다.", "지도나 렌터카 업체 안내가 더 필요합니다.", false, false),
      item("extraChargeReason", "payment", "추가 결제 이유", "도시세", "supported", "호텔 예약 화면 + 도시세 영수증", "receipt", "금액 표시 영역", "City tax JPY 1,200.", "이해형 답변으로 충분할 수 있지만 저장도 가능합니다."),
      item("refundDeposit", "payment", "보증금 환불", "근거 부족", "missing", "현재 자료", "receipt", "자료 전체", "숙소 보증금 환불 조건은 현재 자료에서 찾지 못했습니다.", "자료가 없으면 답을 만들지 않습니다.", false, false)
    ];

    const chatAnswers = {
      "호텔에 늦게 도착하면 어떻게 돼?": answer("호텔에 늦게 도착하면 어떻게 돼?", "22:00 이후 도착하면 숙소에 연락해야 합니다. 호텔 예약 화면과 호스트 안내가 같은 조건을 말합니다.", "supported", "checkin", "lateArrival", "save", "호텔 예약 화면 + 호스트 체크인 안내", "늦은 도착 안내"),
      "투어 바우처 프린트해야 해?": answer("투어 바우처 프린트해야 해?", "현재 바우처에는 모바일 바우처 가능이라고 적혀 있습니다. 프린트 없이 화면 제시로 처리할 수 있습니다.", "supported", "tour", "mobileVoucher", "save", "후지산 투어 바우처", "2쪽 바우처 조건"),
      "투어 늦으면 환불돼?": answer("투어 늦으면 환불돼?", "현재 자료에서는 지각 시 환불 규정을 찾지 못했습니다. 취소 규정이나 투어 약관 자료가 더 필요합니다.", "missing", "tour", "lateTour", "add_source", "현재 자료", "자료 전체"),
      "이 영수증은 왜 낸 거야?": answer("이 영수증은 왜 낸 거야?", "호텔 도시세 JPY 1,200 결제 영수증으로 보입니다. 체크인 때 낸 추가 결제의 이유를 이해하는 데 충분합니다.", "supported", "payment", "extraChargeReason", "keep_answer", "호텔 도시세 영수증", "금액 표시 영역")
    };

    const stateOrder = ["saved", "supported", "needs_review", "missing", "conflict"];
    const stateMeta = {
      saved: { label: "저장됨", className: "saved", empty: "현장 카드 없음" },
      supported: { label: "확인됨", className: "good", empty: "확인된 값 없음" },
      needs_review: { label: "확인 필요", className: "warn", empty: "확인할 항목 없음" },
      missing: { label: "근거 부족", className: "danger", empty: "부족한 근거 없음" },
      conflict: { label: "자료 충돌", className: "danger", empty: "충돌 없음" }
    };

    let selectedSituationId = "checkin";
    let selectedItemId = "lateArrival";
    let activeAnswer = null;

    const $ = (selector) => document.querySelector(selector);
    const artifactById = (id) => artifacts.find((artifactItem) => artifactItem.id === id);
    const situationById = (id) => situations.find((situationItem) => situationItem.id === id);
    const checkItemById = (id) => checkItems.find((checkItem) => checkItem.id === id);

    function item(id, situationId, label, value, state, source, artifactId, locator, snippet, note, saved = false, saveable = true) {
      return { id, situationId, label, value, state, source, artifactId, locator, snippet, note, saved, saveable };
    }

    function answer(question, body, state, situationId, targetId, outcome, source, locator) {
      return { question, body, state, situationId, targetId, outcome, source, locator };
    }

    function displayState(checkItem) {
      return checkItem.saved ? "saved" : checkItem.state;
    }

    function stateLabel(state) {
      return stateMeta[state]?.label || state;
    }

    function stateClass(state) {
      return stateMeta[state]?.className || "info";
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function renderAll() {
      renderCounters();
      renderSources();
      renderFieldCards();
      renderOverview();
      renderTrustBoard();
      renderInspector();
      renderProbe();
    }

    function renderCounters() {
      const saved = checkItems.filter((checkItem) => checkItem.saved);
      const supported = checkItems.filter((checkItem) => checkItem.state === "supported");
      const review = checkItems.filter((checkItem) => ["needs_review", "missing", "conflict"].includes(checkItem.state));
      $("#artifactCount").textContent = `자료 ${artifacts.length}개`;
      $("#supportedCount").textContent = `확인됨 ${supported.length}`;
      $("#reviewCount").textContent = `확인 필요 ${review.length}`;
      $("#savedCount").textContent = `저장됨 ${saved.length}`;
      $("#sideArtifactCount").textContent = artifacts.length;
      $("#sideIssueCount").textContent = review.length;
      $("#sideSavedCount").textContent = saved.length;
      $("#fieldBadge").textContent = saved.length;
    }

    function renderSources() {
      $("#sourceList").innerHTML = artifacts.map((artifact) => `
        <article class="source-card">
          <span class="file-badge">${artifact.kind}</span>
          <span>
            <strong>${artifact.name}</strong>
            <span>${artifact.meta}</span>
            <span>${artifact.file}</span>
            <span class="source-tags">${artifact.linked.map((tag) => `<span class="pill info">${tag}</span>`).join("")}</span>
          </span>
        </article>
      `).join("");
    }

    function renderFieldCards() {
      const saved = checkItems.filter((checkItem) => checkItem.saved);
      if (!saved.length) {
        $("#fieldList").innerHTML = `<p class="saved-empty">아직 현장 카드에 저장한 정보가 없습니다.</p>`;
        return;
      }

      $("#fieldList").innerHTML = saved.map((checkItem) => `
        <button class="field-item" data-item="${checkItem.id}">
          <span>${situationById(checkItem.situationId).title} · ${checkItem.label}</span>
          <strong>${checkItem.value}</strong>
        </button>
      `).join("");
    }

    function renderOverview() {
      const counts = {
        saved: checkItems.filter((checkItem) => checkItem.saved).length,
        supported: checkItems.filter((checkItem) => !checkItem.saved && checkItem.state === "supported").length,
        needs_review: checkItems.filter((checkItem) => checkItem.state === "needs_review").length,
        missing: checkItems.filter((checkItem) => checkItem.state === "missing").length,
        conflict: checkItems.filter((checkItem) => checkItem.state === "conflict").length
      };

      $("#statusOverview").innerHTML = stateOrder.map((state) => `
        <div class="status-card ${stateClass(state)}">
          <span>${stateLabel(state)}</span>
          <strong>${counts[state]}</strong>
          <span>${overviewCopy(state)}</span>
        </div>
      `).join("");
    }

    function overviewCopy(state) {
      return {
        saved: "현장에서 다시 볼 정보",
        supported: "근거가 있는 값",
        needs_review: "직접 확인할 정보",
        missing: "자료가 더 필요한 gap",
        conflict: "원문 비교 필요"
      }[state];
    }

    function renderTrustBoard() {
      $("#trustBoard").innerHTML = situations.map(renderSituation).join("");
    }

    function renderSituation(situation) {
      const related = checkItems.filter((checkItem) => checkItem.situationId === situation.id);
      const saved = related.filter((checkItem) => checkItem.saved).length;
      const needsAttention = related.filter((checkItem) => ["needs_review", "missing", "conflict"].includes(checkItem.state)).length;
      const sourceNames = situation.sourceIds.map((id) => artifactById(id).name).join(", ");

      return `
        <article class="situation-card ${situation.id === selectedSituationId ? "active" : ""}">
          <header class="situation-head">
            <div>
              <span class="pill info">${situation.badge}</span>
              <h2>${situation.title}</h2>
              <small>${situation.meta} · 근거: ${sourceNames}</small>
            </div>
            <div class="status-strip">
              <span class="pill warn">확인할 것 ${needsAttention}</span>
              <span class="pill saved">저장 ${saved}</span>
            </div>
          </header>
          <div class="state-groups">
            ${stateOrder.map((state) => renderStateColumn(state, related)).join("")}
          </div>
        </article>
      `;
    }

    function renderStateColumn(state, related) {
      const items = related.filter((checkItem) => displayState(checkItem) === state);
      return `
        <section class="state-column">
          <header>
            <h3>${stateLabel(state)}</h3>
            <span class="pill ${stateClass(state)}">${items.length}</span>
          </header>
          ${items.length ? items.map(renderCheckItem).join("") : `<div class="empty-lane">${stateMeta[state].empty}</div>`}
        </section>
      `;
    }

    function renderCheckItem(checkItem) {
      const state = displayState(checkItem);
      return `
        <button class="check-item ${checkItem.id === selectedItemId ? "active" : ""}" data-item="${checkItem.id}">
          <span class="item-meta">${checkItem.label}</span>
          <span class="item-value">${checkItem.value}</span>
          <span class="item-source">근거: ${checkItem.source}</span>
          <span class="pill ${stateClass(state)}">${stateLabel(state)}</span>
        </button>
      `;
    }

    function renderInspector() {
      const checkItem = checkItemById(selectedItemId) || checkItems[0];
      const artifact = artifactById(checkItem.artifactId);
      const display = displayState(checkItem);

      $("#inspectorPanel").innerHTML = `
        <div class="panel-head">
          <div>
            <p class="muted">${situationById(checkItem.situationId).title}</p>
            <h2>${checkItem.label}</h2>
            <p>${checkItem.note}</p>
          </div>
          <span class="pill ${stateClass(display)}">${stateLabel(display)}</span>
        </div>
        <div class="panel-body">
          <div class="source-preview" aria-hidden="true">
            <div class="source-page">
              <span class="line dark"></span>
              <span class="line mid"></span>
              <span class="line"></span>
              <span class="line short"></span>
              <div class="source-highlight">
                <span class="line mid"></span>
                <span class="line"></span>
                <span class="line short"></span>
              </div>
            </div>
            <p class="source-caption">${checkItem.source} · ${checkItem.locator}</p>
          </div>
          <dl class="source-table">
            <div class="source-row"><dt>값</dt><dd><strong>${checkItem.value}</strong></dd></div>
            <div class="source-row"><dt>상태</dt><dd>${stateLabel(display)}</dd></div>
            <div class="source-row"><dt>근거 자료</dt><dd>${checkItem.source}</dd></div>
            <div class="source-row"><dt>자료 종류</dt><dd>${artifact?.kindLabel || "자료"}</dd></div>
            <div class="source-row"><dt>찾은 위치</dt><dd>${checkItem.locator}</dd></div>
            <div class="source-row"><dt>원문</dt><dd><code>${checkItem.snippet}</code></dd></div>
          </dl>
          <div class="item-actions" style="margin-top:12px">
            ${renderItemActions(checkItem)}
          </div>
        </div>
      `;
    }

    function renderItemActions(checkItem) {
      if (checkItem.saved) {
        return `<button disabled>현장 카드에 저장됨</button><button class="quiet">원문 보기</button>`;
      }

      if (checkItem.state === "supported" && checkItem.saveable) {
        return `<button class="primary" data-save="${checkItem.id}">현장 정보로 저장</button><button class="quiet">원문 보기</button>`;
      }

      if (checkItem.state === "missing") {
        return `<button class="primary">관련 자료 추가</button><button class="quiet">근거 부족으로 유지</button>`;
      }

      if (checkItem.state === "conflict") {
        return `<button class="primary">원문 비교</button><button class="quiet">확인 필요로 유지</button>`;
      }

      return `<button class="primary">원문에서 직접 확인</button><button class="quiet">확인 필요로 유지</button>`;
    }

    function renderProbe() {
      $("#probeContext").textContent = situationById(selectedSituationId).title;
      $("#questionSuggestions").innerHTML = Object.keys(chatAnswers).map((question) => `
        <button class="suggestion-button" data-question="${question}">${question}</button>
      `).join("");
      $("#answerSlot").innerHTML = renderAnswer();
    }

    function renderAnswer() {
      if (!activeAnswer) {
        return `
          <div class="answer-panel">
            <span class="pill info">답변 대기</span>
            <h3>질문하면 답변은 여기 남습니다</h3>
            <p>저장할 만한 값이면 현장 정보로 올리고, 이해형 답변이나 근거 부족은 다른 결말로 남깁니다.</p>
          </div>
        `;
      }

      const target = activeAnswer.targetId ? checkItemById(activeAnswer.targetId) : null;
      return `
        <div class="answer-panel">
          <div class="chip-row">
            <span class="pill ${stateClass(activeAnswer.state)}">${stateLabel(activeAnswer.state)}</span>
            <span class="pill info">연결: ${situationById(activeAnswer.situationId).title}</span>
          </div>
          <h3>${escapeHtml(activeAnswer.question)}</h3>
          <p>${activeAnswer.body}</p>
          <p>근거: ${activeAnswer.source} · ${activeAnswer.locator}</p>
          <div class="answer-actions">
            ${renderAnswerActions(activeAnswer, target)}
          </div>
        </div>
      `;
    }

    function renderAnswerActions(currentAnswer, target) {
      if (currentAnswer.outcome === "save" && target) {
        if (target.saved) return `<button disabled>이미 현장 카드에 저장됨</button><button data-item="${target.id}">근거 보기</button>`;
        return `<button class="primary" data-save="${target.id}">현장 정보로 저장</button><button data-item="${target.id}">근거 보기</button>`;
      }

      if (currentAnswer.outcome === "add_source") {
        return `<button class="primary">관련 자료 추가</button>${target ? `<button data-item="${target.id}">근거 부족 보기</button>` : ""}`;
      }

      if (currentAnswer.outcome === "keep_answer") {
        return `${target ? `<button data-item="${target.id}">근거 보기</button>` : ""}<button class="quiet" disabled>답변으로 남김</button>`;
      }

      return `<button class="quiet" disabled>답변으로 남김</button>`;
    }

    function askQuestion(question) {
      const cleanQuestion = question.trim();
      if (!cleanQuestion) return;
      const fallback = answer(cleanQuestion, "현재 자료에서는 이 질문에 답할 수 있는 원문 근거를 찾지 못했습니다. 관련 자료를 추가하면 다시 확인할 수 있습니다.", "missing", selectedSituationId, null, "add_source", "현재 자료", "자료 전체");
      activeAnswer = chatAnswers[cleanQuestion] || fallback;
      selectedSituationId = activeAnswer.situationId;
      if (activeAnswer.targetId) selectedItemId = activeAnswer.targetId;
      renderAll();
    }

    function saveItem(id) {
      const target = checkItemById(id);
      if (!target || target.state !== "supported" || !target.saveable) return;
      target.saved = true;
      selectedItemId = target.id;
      selectedSituationId = target.situationId;
      renderAll();
    }

    document.body.addEventListener("click", (event) => {
      const itemTarget = event.target.closest("[data-item]");
      if (itemTarget) {
        const target = checkItemById(itemTarget.dataset.item);
        if (target) {
          selectedItemId = target.id;
          selectedSituationId = target.situationId;
          renderAll();
        }
        return;
      }

      const saveTarget = event.target.closest("[data-save]");
      if (saveTarget) {
        saveItem(saveTarget.dataset.save);
        return;
      }

      const questionTarget = event.target.closest("[data-question]");
      if (questionTarget) {
        $("#questionInput").value = questionTarget.dataset.question;
        askQuestion(questionTarget.dataset.question);
        return;
      }

      if (event.target.id === "askButton") {
        askQuestion($("#questionInput").value);
      }
    });

    renderAll();
  </script>
</body>
</html>
